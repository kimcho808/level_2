<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <title>HTMl, CSS 연습</title>
    <!-- 파비콘 -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- 웹글꼴 -->
    <!-- 디자인 -->
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/properties02.css">
</head>
<body>
    <div class="spiderman">
        <!-- 1. 제목, 포스터 -->
        <h1>SPIDER-MAN : HOMECOMING</h1>
        <p class="poster"><img src="./images/main_poster.png" alt="스파이더맨홈커밍"></p>
        <!-- 2. 소개 -->
        <div class="summary">
            <h2>소개</h2>
            <p class="story">
                그에게 새로운 수트를 선물한 ‘토니 스타크’는 위험한 일은 하지 말라며 조언한다.<br>
                하지만 허세와 정의감으로 똘똘 뭉친 ‘피터 파커’는 세상을 위협하는 강력한 적 ‘벌처’(마이클 키튼)에 맞서려 하는데…
            </p>
        </div>
        <!-- 3. 시리즈 -->
        <div class="movie_series">
            <h2>시리즈</h2>
            <div class="series_g">
                <div class="series1">
                    <p class="series_poster"><img src="./images/new_day.png" alt="스파이더맨브랜드뉴데이"></p>
                    <p class="series_name">스파이더맨 :<br>브랜드 뉴 데이</p>
                </div>
                <div class="series2">
                    <p class="series_poster"><img src="./images/nowayhome.png" alt="스파이더맨노웨이홈"></p>
                    <p class="series_name">스파이더맨 :<br>노 웨이 홈</p>
                </div>
                <div class="series3">
                    <p class="series_poster"><img src="./images/farfromhome.png" alt="스파이더맨파프롬홈"></p>
                    <p class="series_name">스파이더맨 :<br>파 프롬 홈</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
